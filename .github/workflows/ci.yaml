name: CI

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main, "feature/*"]

jobs:
  build-portal:
    name: Build & Push Portal
    runs-on: ubuntu-latest
    # Only push the image on commits to main (not on PRs)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: portal
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/odoo-saas-mvp/portal:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/odoo-saas-mvp/portal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deployment is manual — SSH into the server and run:
      #   KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl -n aeisoftware rollout restart deployment/portal
      # See Operational-Runbook for full steps.
