name: CI — K3s HA Stack

on:
  push:
    branches: [main, "18.0", "feature/*"]
  pull_request:
    branches: [main, "18.0", "feature/*"]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & Push imagen del portal
  # ─────────────────────────────────────────────────────────────────────────────
  build-portal:
    name: Build & Push Portal
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize ref name for Docker tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Lowercase repo owner
        id: repo_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: portal
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/aei-odoo-saas/portal:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/aei-odoo-saas/portal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # On 18.0 branch, also tag as :stable for production clarity
      - name: Tag stable for production
        if: github.event_name == 'push' && github.ref == 'refs/heads/18.0'
        uses: docker/build-push-action@v6
        with:
          context: portal
          push: true
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/aei-odoo-saas/portal:stable
          cache-from: type=gha

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & Push imagen custom de Odoo (odoo:18 + email_validator, etc.)
  # ─────────────────────────────────────────────────────────────────────────────
  build-odoo:
    name: Build & Push Odoo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize ref name for Docker tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Lowercase repo owner
        id: repo_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: docker/odoo
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/aei-odoo-saas/odoo:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/aei-odoo-saas/odoo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # On 18.0 branch, also tag as :stable for production clarity
      - name: Tag stable for production
        if: github.event_name == 'push' && github.ref == 'refs/heads/18.0'
        uses: docker/build-push-action@v6
        with:
          context: docker/odoo
          push: true
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner }}/aei-odoo-saas/odoo:stable
          cache-from: type=gha


