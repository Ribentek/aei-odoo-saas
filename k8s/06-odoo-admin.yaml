---
# Single shared Odoo 18 instance for admin use (admin.aeisoftware.com)
# Includes odoo_k8s_saas and odoo_k8s_saas_subscription addons, cloned from main on each pod start.
apiVersion: v1
kind: Namespace
metadata:
  name: odoo-admin
  labels:
    managed-by: manual

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: odoo-admin-data
  namespace: odoo-admin
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

---
# The Secret holding DB_PASSWORD and ADMIN_PASSWD was extracted to prevent
# overwriting dynamic development secrets during deployment refactoring.

---
# ConfigMap stores the odoo.conf TEMPLATE.
# ${DB_PASSWORD} and ${ADMIN_PASSWD} are substituted at startup by the
# render-config init container using envsubst.
apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-admin-conf
  namespace: odoo-admin
data:
  odoo.conf.tmpl: |
    [options]
    db_host = postgres.aeisoftware.svc.cluster.local
    db_port = 5432
    db_user = odoo
    db_password = ${DB_PASSWORD}
    admin_passwd = ${ADMIN_PASSWD}
    dbfilter = ^admin$
    list_db = True
    addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
    data_dir = /var/lib/odoo
    workers = 2
    max_cron_threads = 1
    gevent_port = 8072
    proxy_mode = True
    # S3 Storage Configuration
    server_wide_modules = base,web,storage_backend_s3,fs_attachment_s3
    s3.bucket = aeisoftware-admin
    s3.endpoint_url = http://minio.aeisoftware.svc.cluster.local:9000
    s3.access_key_id = ${S3_ACCESS_KEY}
    s3.secret_key = ${S3_SECRET_KEY}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-admin
  namespace: odoo-admin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: odoo-admin
  template:
    metadata:
      labels:
        app: odoo-admin
    spec:
      initContainers:
        # 1. Clone the SaaS addons from GitHub
        - name: copy-addon
          image: alpine/git
          command:
            - sh
            - -c
            - |
              # Clone main SaaS repo (base addon + bridge module)
              git clone --depth=1 -b main https://github.com/jpvargassoruco/odoo-saas-mvp.git /tmp/repo
              cp -r /tmp/repo/odoo_k8s_saas /mnt/extra-addons/
              cp -r /tmp/repo/odoo_k8s_saas_subscription /mnt/extra-addons/
              # Clone subscription_oca from OCA fork
              git clone --depth=1 -b 18.0 https://github.com/jpvargassoruco/odoo18-oca-contract.git /tmp/oca-contract
              cp -r /tmp/oca-contract/subscription_oca /mnt/extra-addons/
              # Clone storage OCA repo for S3 backend
              git clone --depth=1 -b 18.0 https://github.com/OCA/storage.git /tmp/oca-storage
              cp -r /tmp/oca-storage/storage_backend_s3 /mnt/extra-addons/
              cp -r /tmp/oca-storage/storage_backend /mnt/extra-addons/
              cp -r /tmp/oca-storage/fs_attachment_s3 /mnt/extra-addons/
              cp -r /tmp/oca-storage/fs_attachment /mnt/extra-addons/
              cp -r /tmp/oca-storage/fs_storage /mnt/extra-addons/
              # Clone connector OCA repo for component dependency
              git clone --depth=1 -b 18.0 https://github.com/OCA/connector.git /tmp/oca-connector
              cp -r /tmp/oca-connector/component /mnt/extra-addons/
              # Clone server-env OCA repo for server_environment dependency
              git clone --depth=1 -b 18.0 https://github.com/OCA/server-env.git /tmp/oca-server-env
              cp -r /tmp/oca-server-env/server_environment /mnt/extra-addons/
              echo "All addons copied OK"
              ls -la /mnt/extra-addons/
          volumeMounts:
            - name: odoo-addons
              mountPath: /mnt/extra-addons

        # 2. Render odoo.conf from template, injecting real secret values
        - name: render-config
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext >/dev/null 2>&1
              envsubst < /tmpl/odoo.conf.tmpl > /etc/odoo/odoo.conf
              echo "odoo.conf rendered:"
              cat /etc/odoo/odoo.conf
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-admin-secret
                  key: DB_PASSWORD
            - name: ADMIN_PASSWD
              valueFrom:
                secretKeyRef:
                  name: odoo-admin-secret
                  key: ADMIN_PASSWD
            - name: S3_ACCESS_KEY
              value: "admin"
            - name: S3_SECRET_KEY
              value: "Aeisoftware2026!"
          volumeMounts:
            - name: odoo-conf-tmpl
              mountPath: /tmpl
            - name: odoo-conf-rendered
              mountPath: /etc/odoo

      containers:
        - name: odoo
          image: odoo:18
          command:
            - /bin/bash
            - -c
            - |
              pip3 install boto3 fsspec s3fs --break-system-packages
              exec /entrypoint.sh odoo
          ports:
            - containerPort: 8069
            - containerPort: 8072
          env:
            - name: SAAS_PORTAL_URL
              value: "http://portal.aeisoftware.svc.cluster.local:8000"
            - name: SAAS_PORTAL_KEY
              valueFrom:
                secretKeyRef:
                  name: portal-secret
                  key: API_KEY
                  optional: true
            - name: MINIO_ROOT_USER
              value: "admin"
            - name: MINIO_ROOT_PASSWORD
              value: "Aeisoftware2026!"
          volumeMounts:
            - name: odoo-conf-rendered
              mountPath: /etc/odoo
            - name: odoo-data
              mountPath: /var/lib/odoo
            - name: odoo-addons
              mountPath: /mnt/extra-addons
          readinessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi

      volumes:
        - name: odoo-conf-tmpl
          configMap:
            name: odoo-admin-conf
        - name: odoo-conf-rendered
          emptyDir: {}
        - name: odoo-data
          persistentVolumeClaim:
            claimName: odoo-admin-data
        - name: odoo-addons
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: odoo-admin-svc
  namespace: odoo-admin
spec:
  selector:
    app: odoo-admin
  ports:
    - name: http
      port: 8069
      targetPort: 8069
    - name: longpoll
      port: 8072
      targetPort: 8072

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: odoo-admin-ingress
  namespace: odoo-admin
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: admin.aeisoftware.com
      http:
        paths:
          - path: /websocket
            pathType: Prefix
            backend:
              service:
                name: odoo-admin-svc
                port:
                  number: 8072
          - path: /
            pathType: Prefix
            backend:
              service:
                name: odoo-admin-svc
                port:
                  number: 8069
