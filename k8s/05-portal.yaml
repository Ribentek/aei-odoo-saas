---
# Standard Ingress for the portal — works with built-in K3s Traefik or any
# nginx-class ingress controller. No CRD dependency.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-ingress
  namespace: aeisoftware
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: aeisoftware-odoo-headers@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: portal.aeisoftware.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal
                port:
                  number: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: aeisoftware
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: saas-portal
      containers:
        - name: portal
          image: ghcr.io/jpvargassoruco/odoo-saas-mvp/portal:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgres.aeisoftware.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5002"                 # PgBouncer pooled → HTTP workers
            - name: POSTGRES_PORT_PRIMARY
              value: "5000"                 # Primary directo → operaciones admin
            - name: POSTGRES_ADMIN_USER
              value: odoo
            - name: POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: portal-secret
                  key: API_KEY
            - name: BASE_DOMAIN
              value: aeisoftware.com
            - name: STORAGE_CLASS
              value: ceph-rbd              # dev: local-path | prod: ceph-rbd
            - name: ODOO_HEADERS_MIDDLEWARE
              value: aeisoftware-odoo-headers@kubernetescrd
            - name: URL_SCHEME
              value: https
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: aeisoftware
spec:
  selector:
    app: portal
  ports:
    - port: 8000
      targetPort: 8000
