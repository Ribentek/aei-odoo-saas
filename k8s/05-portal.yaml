---
# Standard Ingress for the portal — works with built-in K3s Traefik or any
# nginx-class ingress controller. No CRD dependency.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-ingress
  namespace: aeisoftware
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-odoo-headers@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: portal.aeisoftware.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal
                port:
                  number: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: aeisoftware
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: saas-portal
      containers:
        - name: portal
          image: ghcr.io/ribentek/aei-odoo-saas/portal:stable
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgres.aeisoftware.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5000"                 # HAProxy primary directo
            - name: POSTGRES_PORT_PRIMARY
              value: "5000"                 # Same (legacy compat)
            - name: POSTGRES_ADMIN_USER
              value: odoo
            - name: POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: portal-secret
                  key: API_KEY
            - name: BASE_DOMAIN
              value: aeisoftware.com
            - name: STORAGE_CLASS
              value: ceph-rbd              # dev: local-path | prod: ceph-rbd
            - name: ODOO_HEADERS_MIDDLEWARE
              value: aeisoftware-odoo-headers@kubernetescrd
            - name: URL_SCHEME
              value: https
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-credentials
                  key: GIT_TOKEN
                  optional: true
            - name: ODOO_WEBHOOK_URL
              value: "http://odoo-admin-svc.odoo-admin.svc.cluster.local:8069/saas/webhook/instance-status"
            - name: ODOO_WEBHOOK_KEY
              valueFrom:
                secretKeyRef:
                  name: portal-secret
                  key: SAAS_WEBHOOK_KEY
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 2
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: aeisoftware
  labels:
    app: portal          # required for Prometheus ServiceMonitor keep rule
spec:
  selector:
    app: portal
  ports:
    - name: http-metrics
      port: 8000
      targetPort: 8000
