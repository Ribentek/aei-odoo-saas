# Traefik Middleware CRD — adds X-Forwarded-Proto: https header
# Referenced by admin/staging ingresses as "kube-system-odoo-headers@kubernetescrd"
# Referenced by tenant ingresses as "aeisoftware-odoo-headers@kubernetescrd" (via ODOO_HEADERS_MIDDLEWARE env in portal)
# (Traefik naming: <namespace>-<name>@kubernetescrd)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: odoo-headers
  namespace: kube-system
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"

---
# Same middleware in aeisoftware namespace — required by tenant ingresses generated by the portal
# (portal env ODOO_HEADERS_MIDDLEWARE=aeisoftware-odoo-headers@kubernetescrd)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: odoo-headers
  namespace: aeisoftware
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"

---
# Security response headers (HSTS, clickjacking, referrer, MIME sniffing, CSP).
# Referenced by admin/staging/portal ingresses as "kube-system-security-headers@kubernetescrd".
# CSP is intentionally conservative: `frame-ancestors 'self'` is the clickjacking control
# (does NOT restrict script/style sources, so it won't break Odoo's inline assets).
# Tighten toward a full default-src policy iteratively — validate the web client first.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: kube-system
spec:
  headers:
    frameDeny: false
    customResponseHeaders:
      # HSTS set unconditionally (site is HTTPS-only behind Cloudflare); stsSeconds is
      # skipped because Traefik only emits it when it detects the request as TLS, which
      # it does not when traffic arrives via the in-cluster cloudflared tunnel.
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Content-Security-Policy: "frame-ancestors 'self'; upgrade-insecure-requests"

---
# Same middleware in aeisoftware namespace — required by tenant ingresses generated by the portal
# (portal env SECURITY_HEADERS_MIDDLEWARE=aeisoftware-security-headers@kubernetescrd)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: aeisoftware
spec:
  headers:
    frameDeny: false
    customResponseHeaders:
      # HSTS set unconditionally (site is HTTPS-only behind Cloudflare); stsSeconds is
      # skipped because Traefik only emits it when it detects the request as TLS, which
      # it does not when traffic arrives via the in-cluster cloudflared tunnel.
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Content-Security-Policy: "frame-ancestors 'self'; upgrade-insecure-requests"

---
# Blocks sensitive/internal paths at the edge (defense-in-depth alongside Cloudflare WAF).
# Returns 403 for the database manager, RPC endpoints, and the info page. Primary enforcement
# is the Cloudflare WAF rules in infra/apply-cf-security-rules.sh; this covers direct-to-cluster access.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: block-sensitive-paths
  namespace: kube-system
spec:
  plugin:
    # Requires the "denyrequest"-style path-block plugin; if the plugin is unavailable,
    # rely on the Cloudflare WAF rules and drop this middleware from the ingress refs.
    # See docs/wiki/Security-Remediation-2026-07.md for the plugin install note.
    blockpath:
      regex:
        - "^/web/database(/.*)?$"
        - "^/xmlrpc(/.*)?$"
        - "^/jsonrpc$"
        - "^/website/info$"

---
# Traefik Gzip compression
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: odoo-compress
  namespace: kube-system
spec:
  compress: {}

---
# Rate limiting for portal API (10 requests per second, burst of 20)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: portal-ratelimit
  namespace: kube-system
spec:
  rateLimit:
    average: 10
    burst: 20

