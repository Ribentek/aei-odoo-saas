---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-runner
  namespace: backup-system
---
# ClusterRole: permisos mínimos para el orquestador de backups
# - list/get namespaces (enumerar tenants por label managed-by=saas-portal)
# - list/get pods en cualquier namespace (encontrar pod odoo de cada tenant)
# - create pods/exec en namespaces odoo-* y odoo-admin (tar filestore)
# - get secrets en backup-system (sólo el propio ns — montados por K8s directamente)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backup-runner
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backup-runner
subjects:
  - kind: ServiceAccount
    name: backup-runner
    namespace: backup-system
roleRef:
  kind: ClusterRole
  name: backup-runner
  apiGroup: rbac.authorization.k8s.io
