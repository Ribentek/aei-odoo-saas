apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-logical-dump
  namespace: backup-system
  labels:
    app: pg-logical-dump
    managed-by: saas-infra
spec:
  # 03:30 AM America/La_Paz — after pgBackRest diff (02:00 AM)
  schedule: "30 3 * * *"
  timeZone: "America/La_Paz"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 7200   # 2h max — fail-safe
      template:
        metadata:
          labels:
            app: pg-logical-dump
        spec:
          serviceAccountName: backup-runner
          restartPolicy: Never
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              command: ["/bin/sh", "/scripts/pg-dump-all.sh"]
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-superuser-secret
                      key: POSTGRES_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secret
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secret
                      key: AWS_SECRET_ACCESS_KEY
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secret
                      key: S3_ENDPOINT
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secret
                      key: S3_BUCKET
                # Disable aws-cli SSL verify — RadosGW sin HTTPS nativo
                - name: AWS_DEFAULT_REGION
                  value: "default"
                # aws-cli needs HOME for temp files
                - name: HOME
                  value: "/tmp"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
