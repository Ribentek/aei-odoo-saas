apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-prune
  namespace: backup-system
  labels:
    app: backup-prune
    managed-by: saas-infra
spec:
  # 05:00 AM Sunday America/La_Paz — after filestore dump completes
  schedule: "0 5 * * 0"
  timeZone: "America/La_Paz"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: backup-prune
        spec:
          serviceAccountName: backup-runner
          restartPolicy: Never
          containers:
            - name: prune
              image: alpine/k8s:1.34.1
              command: ["/bin/sh", "/scripts/prune-s3.sh"]
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secret
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secret
                      key: AWS_SECRET_ACCESS_KEY
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secret
                      key: S3_ENDPOINT
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-secret
                      key: S3_BUCKET
                - name: AWS_DEFAULT_REGION
                  value: "default"
                - name: HOME
                  value: "/tmp"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
