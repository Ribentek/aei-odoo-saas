# k8s/07-cloudflare-tunnel.yaml
# Cloudflare Tunnel — expone admin.aeisoftware.com → odoo-admin:8069 en k3s
#
# IMPORTANTE: el routing se configura en el dashboard de Cloudflare Zero Trust:
#   Zero Trust > Networks > Tunnels > <este-tunnel> > Edit > Public Hostname
#   Subdomain: admin | Domain: aeisoftware.com | Service: http://odoo-admin.odoo.svc.cluster.local:8069
#
# ⚠️  El Secret cloudflared-token se crea en apply-manifests.sh desde .secrets.env
# NO incluir el token en este archivo — está en .gitignore
# El token se inyecta con:
#   kubectl -n cloudflare create secret generic cloudflared-token \
#     --from-literal=TUNNEL_TOKEN="${CLOUDFLARE_TUNNEL_TOKEN}" --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare
  labels:
    app: cloudflared
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: TUNNEL_TOKEN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # Sin probes — igual que el docker-compose que funciona.
          # k8s reinicia el pod automáticamente si el proceso muere.
      restartPolicy: Always
