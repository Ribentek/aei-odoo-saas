# Traefik Ingress Controller via k3s HelmChart CRD
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: traefik
  namespace: kube-system
spec:
  repo: https://traefik.github.io/charts
  chart: traefik
  targetNamespace: kube-system
  valuesContent: |-
    service:
      type: LoadBalancer
    ports:
      web:
        port: 8000
        exposedPort: 80
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik
    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true
    logs:
      general:
        level: INFO
---
# HelmChartConfig — K3s overlay que se fusiona con el HelmChart de arriba.
# Añade HA: 2 réplicas distribuidas en nodos distintos.
# TLS termina en Cloudflare (Full mode) → no se necesita almacenamiento
# compartido de certificados ACME entre réplicas.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    deployment:
      replicas: 2
    # Trust forwarded headers (X-Forwarded-Proto / real client IP) from Cloudflare edge ranges.
    # Needed so Odoo (proxy_mode=True) sees the request as HTTPS and marks session cookies Secure.
    # NOTE: when traffic arrives via the in-cluster cloudflared tunnel, the immediate source is the
    # tunnel pod, so the deterministic cookie-flag enforcement lives in the saas_security_hardening
    # addon; this block still fixes real-client-IP logging and direct-LB paths.
    ports:
      web:
        forwardedHeaders:
          trustedIPs:
            - "173.245.48.0/20"
            - "103.21.244.0/22"
            - "103.22.200.0/22"
            - "103.31.4.0/22"
            - "141.101.64.0/18"
            - "108.162.192.0/18"
            - "190.93.240.0/20"
            - "188.114.96.0/20"
            - "197.234.240.0/22"
            - "198.41.128.0/17"
            - "162.158.0.0/15"
            - "104.16.0.0/13"
            - "104.24.0.0/14"
            - "172.64.0.0/13"
            - "2400:cb00::/32"
            - "2606:4700::/32"
            - "2803:f800::/32"
            - "2405:b500::/32"
            - "2405:8100::/32"
            - "2a06:98c0::/29"
            - "2c0f:f248::/32"
    affinity:
      podAntiAffinity:
        # Garantiza una réplica por nodo físico.
        # Con 3 nodos y 2 réplicas siempre es satisfacible;
        # si un nodo cae, el pod migra al nodo vacío restante.
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: traefik
                app.kubernetes.io/instance: traefik-kube-system
            topologyKey: kubernetes.io/hostname
