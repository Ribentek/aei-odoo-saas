---
# ServiceAccount for portal to call K8s API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: saas-portal
  namespace: aeisoftware

---
# ClusterRole: portal needs wide access to manage odoo-* namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: saas-portal-role
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, pods/log, services, configmaps, secrets, persistentvolumeclaims, limitranges, resourcequotas]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: saas-portal-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: saas-portal-role
subjects:
  - kind: ServiceAccount
    name: saas-portal
    namespace: aeisoftware
